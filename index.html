<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presensi Pengumpulan Laporan</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="logo.png">

</head>
<body>
<div class="container">
    <button class="btn-logout-fixed" onclick="logout()">Logout</button>

    <h2>Presensi Pengumpulan Laporan</h2>

    <form id="formData">
        <div class="input-group">
            <input type="text" id="Nama" required>
            <label>Nama</label>
        </div>

        <div class="input-group">
            <input type="text" id="NIU" required>
            <label>NIU</label>
        </div>

        <div class="input-group">
            <select id="Kelas" required>
                <option value="" disabled selected hidden></option>
                <option>Fisika</option>
                <option>Geofisika</option>
                <option>IUP Physics</option>
            </select>
            <label>Kelas</label>
        </div>

        <button type="submit">Kirim</button>
    </form>
    <h3>Data Terkumpul</h3>
<div class="table-wrapper">

    <div class="filter-container">
        <input type="text" id="searchInput" placeholder="🔍 Cari Nama / NIU / Kelas...">

        <select id="filterKelas">
            <option value="">Semua Kelas</option>
            <option>Fisika</option>
            <option>Geofisika</option>
            <option>IUP Physics</option>
        </select>

        <input type="date" id="filterTanggal">

        <select id="rowsPerPage">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="all">Semua</option>
        </select>

        <button class="btn-excel" onclick="downloadExcel()">⬇ Excel</button>
    </div>

    <table>
        <thead>
            <tr>
                <th onclick="sortTable('Nama')">Nama</th>
                <th onclick="sortTable('NIU')">NIU</th>
                <th onclick="sortTable('Kelas')">Kelas</th>
                <th onclick="sortTable('Waktu')">Waktu</th>
                <th onclick="sortTable('Poin')">Poin</th>
                <th>Aksi</th>
	</tr>
        </thead>
        <tbody id="dataTable"></tbody>
    </table>
    <div id="pagination" class="pagination"></div>
<button class="btn-hapus-semua" onclick="hapusSemua()">
    🗑 Hapus Semua
</button>
</div>
<script type="module">
// 🔐 CEK LOGIN
if (localStorage.getItem("isLogin") !== "true") {
    window.location.href = "login.html";
}
window.logout = function() {
    localStorage.removeItem("isLogin");
    localStorage.removeItem("userEmail");
    window.location.href = "login.html";
}
let sortField = null;
let sortAsc = true;
let semuaData = [];
let currentData = [];

let currentPage = 1;   
let rowsPerPage = 10;  
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
 import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
 const firebaseConfig = {
    apiKey: "AIzaSyDzCK1hF39bYcx16sc0hCoCfUOdhqtzeVo",
    authDomain: "presensi-app-aabb9.firebaseapp.com",
    projectId: "presensi-app-aabb9",
    storageBucket: "presensi-app-aabb9.firebasestorage.app",
    messagingSenderId: "881822154087",
    appId: "1:881822154087:web:bfb66e8629734e320203c2"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

window.sortTable = function(field) {

    const map = {
        "Nama": "nama",
        "NIU": "niu",
        "Kelas": "kelas",
        "Waktu": "waktu",
        "Poin": "poin"
    };

    let key = map[field];

    if (sortField === key) {
        sortAsc = !sortAsc;
    } else {
        sortField = key;
        sortAsc = true;
    }

    renderTable(); // ❗ TANPA sort di sini
};
// SUBMIT
document.getElementById("formData").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nama = document.getElementById("Nama").value;
    const niu = document.getElementById("NIU").value;
    const kelas = document.getElementById("Kelas").value;

    const waktu = new Date();
    const poin = hitungPoin(kelas, waktu);

    await addDoc(collection(db, "presensi"), {
        nama,
        niu,
        kelas,
        waktu: waktu.toLocaleString(),
        poin
    });
document.getElementById("formData").reset(); // ✅ ini
}); // ✅ WAJIB ADA INI

// LOAD DATA
function initRealtime() {
    const table = document.getElementById("dataTable");

    onSnapshot(collection(db, "presensi"), (snapshot) => {
	semuaData = [];

	snapshot.forEach((docSnap) => {
    	semuaData.push({
        	id: docSnap.id,
        	...docSnap.data()
    });
});

renderTable();
    });
}
// DELETE
window.hapusData = async function(id) {
    await deleteDoc(doc(db, "presensi", id));
    alert("Data dihapus!");
};
function getJadwal(kelas) {
    if (kelas === "Fisika") 
        return { praktikum: 1, deadline: 4, hour: 15 };

    if (kelas === "Geofisika") 
        return { praktikum: 4, deadline: 1, hour: 12 };

    if (kelas === "IUP Physics") 
        return { praktikum: 5, deadline: 2, hour: 12 };
}

function getPraktikumTerakhir(submit, hariPraktikum) {
    let date = new Date(submit);

    let selisih = (submit.getDay() - hariPraktikum + 7) % 7;
    date.setDate(submit.getDate() - selisih);

    date.setHours(0,0,0,0);
    return date;
}

function hitungPoin(kelas, waktuSubmit) {
    let jadwal = getJadwal(kelas);
    let submit = new Date(waktuSubmit);

    let praktikum = getPraktikumTerakhir(submit, jadwal.praktikum);

    let deadline = new Date(praktikum);
    let diff = (jadwal.deadline - jadwal.praktikum + 7) % 7;

    deadline.setDate(praktikum.getDate() + diff);
    deadline.setHours(jadwal.hour, 0, 0, 0);

    let selisih = (submit - deadline) / (1000 * 60);

    if (selisih <= 0) return 0;
    if (selisih <= 30) return -5;
    if (selisih <= 60) return -10;
    if (selisih < 1440) return -15;
    return "-50%";
}
window.hapusSemua = async function() {
    if (confirm("Yakin mau hapus semua data?")) {
        const querySnapshot = await getDocs(collection(db, "presensi"));

        const promises = querySnapshot.docs.map((docSnap) => {
            return deleteDoc(doc(db, "presensi", docSnap.id));
        });

        await Promise.all(promises);

        alert("Semua data berhasil dihapus!");
    }
}
initRealtime();


function renderTable() {
    let table = document.getElementById("dataTable");
    table.innerHTML = "";

    const keyword = document.getElementById("searchInput").value.toLowerCase();
    const kelasFilter = document.getElementById("filterKelas").value;
    const tanggalFilter = document.getElementById("filterTanggal").value;

    // 🔥 FILTER DATA
    currentData = semuaData.filter((item) => {

        if (
            keyword &&
            !item.nama.toLowerCase().includes(keyword) &&
            !String(item.niu).toLowerCase().includes(keyword) &&
            !item.kelas.toLowerCase().includes(keyword)
        ) return false;

        if (kelasFilter && item.kelas !== kelasFilter) return false;

        if (tanggalFilter) {
            const tanggalData = new Date(item.waktu).toISOString().split("T")[0];
            if (tanggalData !== tanggalFilter) return false;
        }

        return true;
    });
	if (sortField) {
    currentData.sort((a, b) => {
        let valA = a[sortField];
        let valB = b[sortField];

        if (!isNaN(valA) && !isNaN(valB)) {
            return sortAsc ? valA - valB : valB - valA;
        }

        valA = String(valA).toLowerCase();
        valB = String(valB).toLowerCase();

        if (valA < valB) return sortAsc ? -1 : 1;
        if (valA > valB) return sortAsc ? 1 : -1;
        return 0;
    });
}
    // 🔥 PAGINATION
    let start = (currentPage - 1) * rowsPerPage;
    let end = rowsPerPage === "all" ? currentData.length : start + rowsPerPage;

    let paginatedData = rowsPerPage === "all"
        ? currentData
        : currentData.slice(start, end);
// 🔥 RENDER TABLE
paginatedData.forEach((item, index) => {
    let row = `
        <tr>
            <td>${item.nama}</td>
            <td>${item.niu}</td>
            <td>${item.kelas}</td>
            <td>${item.waktu}</td>
            <td>${item.poin}</td>
            <td>
                <button onclick="hapusData('${item.id}')">❌</button>
            </td>
        </tr>
    `;
    table.innerHTML += row;
});

// 🔥 PANGGIL PAGINATION
renderPagination();
}
function renderPagination() {
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = "";

    const totalPages = rowsPerPage === "all"
        ? 1
        : Math.ceil(currentData.length / rowsPerPage);

    if (totalPages <= 1) {
        pagination.innerHTML = "";
        return;
    }

    for (let i = 1; i <= totalPages; i++) {
        pagination.innerHTML += `
            <button onclick="goToPage(${i})"
                class="${i === currentPage ? 'active' : ''}">
                ${i}
            </button>
        `;
    }
}

window.goToPage = function(page) {
    currentPage = page;
    renderTable();
}
document.getElementById("searchInput").addEventListener("input", renderTable);
document.getElementById("filterKelas").addEventListener("change", renderTable);
document.getElementById("filterTanggal").addEventListener("change", renderTable);
document.getElementById("rowsPerPage").addEventListener("change", function() {
    rowsPerPage = this.value === "all" ? "all" : parseInt(this.value);
    currentPage = 1; // reset ke halaman pertama
    renderTable();
});
	window.downloadExcel = function () {
    if (currentData.length === 0) {
        alert("Tidak ada data untuk didownload!");
        return;
    }

    let csv = "Nama,NIU,Kelas,Waktu,Poin\n";

    currentData.forEach(item => {
        csv += `${item.nama},${item.niu},${item.kelas},${item.waktu},${item.poin}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "data_presensi.csv";
    a.click();

    window.URL.revokeObjectURL(url);
};
</script>
</body>
</html>
